# Publish Appstack Unity SDK: GitHub Release + OpenUPM package.
# Trigger: push a semantic version tag such as 1.0.0.

name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create release, package, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read tag version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package and wrapper versions
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: node scripts~/set-version.mjs --check "$TAG_VERSION"

      - name: Create root UPM package archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_NAME="appstack-unity-sdk-${VERSION}"
          PACKAGE_ROOT="dist/${PACKAGE_NAME}"
          PACKAGE_ENTRIES=(
            package.json package.json.meta
            README.md README.md.meta
            CHANGELOG.md CHANGELOG.md.meta
            LICENSE.md LICENSE.md.meta
            USAGE.md USAGE.md.meta
            Runtime Runtime.meta
            Editor Editor.meta
            Tests Tests.meta
            "Samples~" "Documentation~"
          )

          mkdir -p "$PACKAGE_ROOT"
          for entry in "${PACKAGE_ENTRIES[@]}"; do
            if [[ ! -e "$entry" ]]; then
              echo "::error::Required package entry is missing: $entry"
              exit 1
            fi
            cp -R "$entry" "$PACKAGE_ROOT/"
          done

          (cd dist && zip -q -r "../${PACKAGE_NAME}.zip" "$PACKAGE_NAME")
          echo "package_name=${PACKAGE_NAME}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Appstack Unity SDK ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.

            ### Install through Unity Package Manager

            1. Download and extract `appstack-unity-sdk-${{ steps.version.outputs.version }}.zip`.
            2. In Unity, open **Window → Package Manager**.
            3. Select **+ → Add package from disk** and choose the extracted root `package.json`.
            4. Complete the [iOS](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation~/iOS.md) and [Android](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation~/Android.md) setup.
          files: ${{ env.package_name }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to OpenUPM
        uses: openupm/openupm-action@v1
        with:
          package: com.appstack.unity-sdk
          tag: ${{ github.ref_name }}
          timeout-minutes: 30
